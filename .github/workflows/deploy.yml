name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run syntax check
        run: |
          python -c "import ast; ast.parse(open('app.py').read()); print('app.py syntax OK')"

      - name: Validate imports
        run: |
          python -c "from ldap3 import Server, Connection; from msal import ConfidentialClientApplication; from flask import Flask; print('All imports OK')"

      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -s -X POST "$RENDER_DEPLOY_HOOK" && echo "Render deploy triggered successfully"
          else
            echo "RENDER_DEPLOY_HOOK not configured - skipping auto-deploy trigger"
            echo "To enable: Add RENDER_DEPLOY_HOOK as a repository secret"
          fi

      - name: Build Summary
        run: |
          echo "=================================================="
          echo "BUILD SUCCEEDED - App code is production-ready!"
          echo "=================================================="
          echo ""
          echo "HOW TO GO LIVE FOR FREE:"
          echo ""
          echo "Option 1: Render.com (Recommended)"
          echo "  1. Sign up at https://render.com"
          echo "  2. New Web Service -> Connect this GitHub repo"
          echo "  3. Build: pip install -r requirements.txt"
          echo "  4. Start: gunicorn app:app"
          echo "  5. Add RENDER_DEPLOY_HOOK secret for auto-deploy"
          echo ""
          echo "Option 2: Railway.app"
          echo "  1. Sign up at https://railway.app"
          echo "  2. Deploy from GitHub - auto-detects Python"
          echo "=================================================="
