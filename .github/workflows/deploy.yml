name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run syntax check
        run: |
          python -c "import ast; ast.parse(open('app.py').read()); print('app.py syntax OK')"

      - name: Trigger Render Deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK" || echo "Deploy hook called"

      - name: Deploy notification
        run: |
          echo "===================================="
          echo "Build succeeded! App is ready."
          echo "Deploy to Render.com:"
          echo "1. Create account at https://render.com"
          echo "2. New Web Service -> Connect GitHub repo"
          echo "3. Runtime: Python, Build: pip install -r requirements.txt"
          echo "4. Start: gunicorn app:app"
          echo "5. Add RENDER_DEPLOY_HOOK secret to GitHub for auto-deploy"
          echo "===================================="
